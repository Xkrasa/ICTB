<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 团播资产画布</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; background: #0a0a0c; color: #e0e0e0; }

    /* ═══════════ 节点类型配色 ═══════════ */
    :root {
      --c-image_input: #3B82F6;
      --c-gpt_image:   #A855F7;
      --c-remove_bg:   #06B6D4;
      --c-seedance:    #F59E0B;
      --c-mask_edit:   #EC4899;
    }

    /* ═══════════ 工具栏 ═══════════ */
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0; height: 48px; z-index: 1000;
      display: flex; align-items: center; gap: 4px; padding: 0 12px;
      background: rgba(14, 14, 18, 0.92); backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    #toolbar .logo { font-size: 14px; font-weight: 700; color: #fff; margin-right: 8px; white-space: nowrap; letter-spacing: 0.5px; }
    #toolbar .logo span { color: var(--c-gpt_image); }
    .tb-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.08); margin: 0 4px; }
    #toolbar .spacer { flex: 1; }
    .tb-btn {
      display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px;
      border-radius: 7px; border: 1px solid transparent;
      background: transparent; color: #aaa; font-size: 12px; cursor: pointer;
      transition: all 0.12s; white-space: nowrap;
    }
    .tb-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
    .tb-btn .icon { font-size: 14px; }
    .tb-btn.add-btn:hover { background: rgba(255,255,255,0.06); }
    .tb-btn.add-btn[data-type="image_input"]:hover { color: var(--c-image_input); }
    .tb-btn.add-btn[data-type="gpt_image"]:hover { color: var(--c-gpt_image); }
    .tb-btn.add-btn[data-type="remove_bg"]:hover { color: var(--c-remove_bg); }
    .tb-btn.add-btn[data-type="seedance_video"]:hover { color: var(--c-seedance); }
    .tb-btn.add-btn[data-type="mask_edit"]:hover { color: var(--c-mask_edit); }
    .tb-btn.primary {
      background: linear-gradient(135deg, #6366F1, #8B5CF6); color: #fff; font-weight: 600;
      border: 1px solid rgba(139,92,246,0.4); box-shadow: 0 2px 8px rgba(99,102,241,0.25);
    }
    .tb-btn.primary:hover { background: linear-gradient(135deg, #5558E0, #7B4CE6); box-shadow: 0 4px 12px rgba(99,102,241,0.35); }
    .tb-btn.danger:hover { background: rgba(239,68,68,0.12); color: #ef4444; }
    #zoom-display { font-size: 11px; color: #666; min-width: 40px; text-align: center; font-variant-numeric: tabular-nums; }

    /* ═══════════ 视口层 ═══════════ */
    #viewport {
      position: fixed; top: 48px; left: 0; right: 0; bottom: 0;
      overflow: hidden; cursor: default;
      background:
        radial-gradient(ellipse 800px 600px at 25% 15%, rgba(99,102,241,0.06), transparent),
        radial-gradient(ellipse 600px 400px at 75% 85%, rgba(168,85,247,0.05), transparent),
        radial-gradient(ellipse 500px 500px at 50% 50%, rgba(6,182,212,0.03), transparent),
        #0a0a0c;
    }
    #viewport.panning { cursor: grabbing; }

    /* 画布层 */
    #workspace { position: absolute; top: 0; left: 0; width: 1px; height: 1px; transform-origin: 0 0; will-change: transform; }

    /* 点阵网格背景 */
    #grid-bg {
      position: absolute; top: -5000px; left: -5000px; width: 10000px; height: 10000px;
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
    }

    /* SVG 连线层 */
    #svg-layer { position: absolute; top: 0; left: 0; width: 10000px; height: 10000px; pointer-events: none; overflow: visible; }
    #svg-layer .conn-path { fill: none; stroke: rgba(120,120,130,0.4); stroke-width: 2; pointer-events: stroke; cursor: pointer; transition: stroke 0.15s; }
    #svg-layer .conn-path:hover { stroke: #6366F1; stroke-width: 2.5; }
    #svg-layer .conn-path.selected { stroke: #6366F1; stroke-width: 2.5; filter: drop-shadow(0 0 4px rgba(99,102,241,0.5)); }
    #svg-layer .conn-path.running { stroke: #6366F1; stroke-width: 2.5; stroke-dasharray: 8 4; animation: flow 0.6s linear infinite; filter: drop-shadow(0 0 4px rgba(99,102,241,0.4)); }
    #svg-layer .conn-temp { fill: none; stroke: #6366F1; stroke-width: 2; stroke-dasharray: 6 4; pointer-events: none; }
    @keyframes flow { to { stroke-dashoffset: -12; } }

    /* ═══════════ 节点层 ═══════════ */
    #nodes-layer { position: absolute; top: 0; left: 0; }

    .node {
      position: absolute; min-width: 210px; max-width: 270px;
      background: rgba(22, 22, 28, 0.82); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.07); border-radius: 10px;
      border-left: 3px solid var(--node-color, #555);
      overflow: hidden; user-select: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .node.gen-node { width: 440px; min-width: 440px; max-width: 440px; }
    .node:hover { border-color: rgba(255,255,255,0.15); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
    .node.selected { border-color: var(--node-color); box-shadow: 0 0 0 1px var(--node-color), 0 8px 24px rgba(0,0,0,0.4); }
    .node.dragging { opacity: 0.85; }

    .node-header {
      display: flex; align-items: center; gap: 7px; padding: 8px 10px;
      font-size: 12px; font-weight: 600; cursor: grab;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .node-header:active { cursor: grabbing; }
    .node-header .node-icon {
      font-size: 14px; width: 22px; height: 22px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      background: color-mix(in srgb, var(--node-color) 18%, transparent);
    }
    .node-header .node-title { flex: 1; color: #ddd; }
    .node-header .node-badge {
      font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 500;
      background: rgba(255,255,255,0.06); color: #777; letter-spacing: 0.3px;
    }
    .node-header .node-badge.running { background: rgba(99,102,241,0.18); color: #818CF8; }
    .node-header .node-badge.success { background: rgba(16,185,129,0.18); color: #34D399; }
    .node-header .node-badge.failed { background: rgba(239,68,68,0.18); color: #F87171; }
    .node-header .node-badge.blocked { background: rgba(245,158,11,0.18); color: #FBBF24; }

    .node-body { padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }

    /* 端口 */
    .port {
      position: absolute; width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid var(--node-color, #555); background: #0a0a0c;
      cursor: crosshair; z-index: 10; transition: all 0.12s;
    }
    .port:hover { background: var(--node-color); transform: scale(1.3); box-shadow: 0 0 8px var(--node-color); }
    .port.port-in { left: -6px; top: 50%; transform: translateY(-50%); }
    .port.port-in:hover { transform: translateY(-50%) scale(1.3); }
    .port.port-out { right: -6px; top: 50%; transform: translateY(-50%); }
    .port.port-out:hover { transform: translateY(-50%) scale(1.3); }

    /* 输入控件 */
    .node-input {
      width: 100%; padding: 5px 7px; font-size: 11px;
      background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 5px; color: #ccc; outline: none; transition: border-color 0.12s;
    }
    .node-input:focus { border-color: var(--node-color); background: rgba(0,0,0,0.45); }
    .node-input::placeholder { color: #444; }
    textarea.node-input { resize: vertical; min-height: 44px; font-family: inherit; }
    .node-label { font-size: 10px; color: #666; margin-bottom: 1px; }

    /* 预览图 */
    .node-preview {
      width: 100%; height: 110px; border-radius: 6px; overflow: hidden;
      background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center;
      position: relative; border: 1px solid rgba(255,255,255,0.04);
    }
    .node-preview img { max-width: 100%; max-height: 100%; object-fit: contain; position: relative; z-index: 1; }
    .node-preview .preview-placeholder { color: #333; font-size: 24px; z-index: 1; }
    .node-preview .checkerboard {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(45deg, #18181c 25%, transparent 25%),
        linear-gradient(-45deg, #18181c 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #18181c 75%),
        linear-gradient(-45deg, transparent 75%, #18181c 75%);
      background-size: 10px 10px; background-position: 0 0, 0 5px, 5px -5px, -5px 0;
      z-index: 0;
    }

    /* 进度条 */
    .node-progress-bar { height: 2px; border-radius: 1px; background: rgba(255,255,255,0.04); overflow: hidden; }
    .node-progress-bar .fill { height: 100%; background: var(--node-color); transition: width 0.3s; border-radius: 1px; }
    .node-progress-bar .fill.running { animation: pulse 1.5s ease-in-out infinite; }
    .node-progress-bar .fill.success { background: #10B981; }
    .node-progress-bar .fill.failed { background: #EF4444; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* ═══════════ 生成类节点专用样式（生图/生视频）═══════════ */
    .gen-prompt-box {
      display: flex; gap: 8px; padding: 6px 8px;
      background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px; align-items: stretch;
    }
    .gen-thumb {
      width: 40px; height: 40px; border-radius: 5px; overflow: hidden;
      flex: 0 0 40px; border: 1px solid rgba(255,255,255,0.08); background: #111;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .gen-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .gen-thumb-empty { font-size: 14px; color: #333; }
    .gen-textarea-wrap {
      flex: 1; position: relative; display: flex; flex-direction: column;
    }
    .gen-textarea-wrap textarea {
      width: 100%; min-height: 110px; max-height: 260px; background: transparent;
      border: none; outline: none; color: #ddd; font-size: 11px; line-height: 1.55;
      resize: vertical; padding: 2px 0 14px 0;
      overflow-y: auto; scrollbar-width: thin; flex: 1;
    }
    .gen-textarea-wrap textarea::-webkit-scrollbar { width: 4px; }
    .gen-textarea-wrap textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
    .gen-textarea-wrap textarea::placeholder { color: #444; }
    .gen-char-count {
      position: absolute; bottom: 0; right: 0; font-size: 9px; color: #555;
      font-variant-numeric: tabular-nums;
    }
    .gen-toolbar {
      display: flex; align-items: center; gap: 5px; margin-top: 6px;
      padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.04);
    }
    .gen-toolbar select, .gen-toolbar button {
      padding: 4px 7px; border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.04);
      color: #999; font-size: 10px; cursor: pointer; outline: none;
      white-space: nowrap; line-height: 1.2;
    }
    .gen-toolbar select:hover, .gen-toolbar button:hover { background: rgba(255,255,255,0.08); color: #ddd; }
    .gen-toolbar .spacer { flex: 1; }
    .gen-toolbar .cost { font-size: 10px; color: #666; display: flex; align-items: center; gap: 3px; }
    .gen-toolbar .magic-btn {
      display: inline-block; color: var(--node-color); border-color: rgba(255,255,255,0.1);
      padding: 0 8px;
    }
    .gen-toolbar .magic-btn:hover { background: rgba(255,255,255,0.08); }
    .gen-toolbar .send-btn {
      width: 22px; padding: 0; display: inline-flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #6366F1, #8B5CF6); border: none; color: #fff;
    }
    .gen-toolbar .send-btn:hover { opacity: 0.9; }

    /* 删除按钮 */
    .node-delete {
      position: absolute; top: 6px; right: 6px; width: 16px; height: 16px;
      border-radius: 4px; border: none; background: rgba(239,68,68,0.15); color: #F87171;
      font-size: 10px; cursor: pointer; display: none; align-items: center; justify-content: center; line-height: 1;
    }
    .node:hover .node-delete { display: flex; }
    .node-delete:hover { background: rgba(239,68,68,0.3); }

    /* 上传按钮 */
    .upload-btn {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      padding: 6px; border: 1px dashed rgba(255,255,255,0.1); border-radius: 6px;
      cursor: pointer; font-size: 11px; color: #666; transition: all 0.12s;
    }
    .upload-btn:hover { border-color: var(--c-image_input); color: var(--c-image_input); }

    /* ═══════════ 右键菜单 ═══════════ */
    #context-menu {
      position: fixed; z-index: 2000; min-width: 150px;
      background: rgba(22,22,28,0.95); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
      padding: 4px; display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #context-menu .menu-item {
      display: flex; align-items: center; gap: 7px; padding: 7px 10px;
      border-radius: 5px; font-size: 12px; cursor: pointer; color: #aaa;
      transition: background 0.1s;
    }
    #context-menu .menu-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
    #context-menu .menu-item .mi-icon { font-size: 14px; width: 18px; text-align: center; }

    /* ═══════════ 画布列表弹窗 ═══════════ */
    #canvas-modal {
      position: fixed; z-index: 3000; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
    }
    #canvas-modal .modal-box {
      width: 420px; max-height: 60vh; overflow-y: auto;
      background: rgba(22,22,28,0.95); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 20px;
    }
    #canvas-modal .modal-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 12px; }
    #canvas-modal .canvas-item {
      display: flex; align-items: center; gap: 8px; padding: 10px 12px;
      border-radius: 7px; cursor: pointer; transition: background 0.1s;
      border: 1px solid rgba(255,255,255,0.04); margin-bottom: 4px;
    }
    #canvas-modal .canvas-item:hover { background: rgba(255,255,255,0.06); }
    #canvas-modal .canvas-item .ci-name { flex: 1; font-size: 13px; color: #ddd; }
    #canvas-modal .canvas-item .ci-meta { font-size: 10px; color: #555; }
    #canvas-modal .close-btn { position: absolute; top: 16px; right: 16px; cursor: pointer; color: #555; font-size: 18px; }

    /* ═══════════ 状态栏 ═══════════ */
    #statusbar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 24px; z-index: 1000;
      display: flex; align-items: center; gap: 12px; padding: 0 12px;
      background: rgba(14,14,18,0.92); backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.04);
      font-size: 10px; color: #555;
    }
    #statusbar .sb-item { display: flex; align-items: center; gap: 3px; }
    #statusbar .sb-dot { width: 5px; height: 5px; border-radius: 50%; background: #333; }
    #statusbar .sb-dot.running { background: #6366F1; box-shadow: 0 0 5px #6366F1; }
    #statusbar .sb-dot.success { background: #10B981; }
    #statusbar .sb-dot.failed { background: #EF4444; }

    /* ═══════════ 遮罩编辑器弹窗 ═══════════ */
    #mask-editor-modal {
      position: fixed; z-index: 3000; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
    }
    #mask-editor-modal .mask-editor-box {
      background: rgba(22,22,28,0.95); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 12px;
    }
    #mask-editor-modal .mask-editor-header {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 15px; font-weight: 600; color: #fff;
    }
    #mask-editor-modal .mask-editor-header .close-btn { cursor: pointer; color: #888; font-size: 16px; }
    #mask-editor-modal .mask-editor-header .close-btn:hover { color: #fff; }
    #mask-editor-modal .mask-editor-toolbar {
      display: flex; gap: 12px; align-items: center; font-size: 12px; color: #aaa;
    }
    #mask-editor-modal .mask-editor-toolbar button {
      padding: 4px 10px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05); color: #ccc; cursor: pointer; font-size: 12px;
    }
    #mask-editor-modal .mask-editor-toolbar button:hover { background: rgba(255,255,255,0.1); color: #fff; }
    #mask-editor-modal .mask-editor-toolbar input[type="range"] { vertical-align: middle; }
    #mask-editor-modal canvas {
      border-radius: 8px; cursor: crosshair; max-width: 90vw; max-height: 70vh;
    }
    #mask-editor-modal .mask-editor-footer {
      display: flex; justify-content: flex-end; gap: 8px;
    }
    #mask-editor-modal .mask-editor-footer button {
      padding: 6px 16px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05); color: #ccc; cursor: pointer; font-size: 13px;
    }
    #mask-editor-modal .mask-editor-footer button:hover { background: rgba(255,255,255,0.1); color: #fff; }
    #mask-editor-modal .mask-editor-footer button.primary {
      background: linear-gradient(135deg, #6366F1, #8B5CF6); color: #fff; border: none;
    }
  </style>
</head>
<body>

  <!-- ═══════════ 工具栏 ═══════════ -->
  <div id="toolbar">
    <span class="logo">🎬 AI 团播<span>画布</span></span>
    <div class="tb-divider"></div>
    <button class="tb-btn add-btn" data-type="image_input" onclick="addNode('image_input')"><span class="icon">🖼️</span>图片输入</button>
    <button class="tb-btn add-btn" data-type="gpt_image" onclick="addNode('gpt_image')"><span class="icon">✨</span>AI 生图</button>
    <button class="tb-btn add-btn" data-type="remove_bg" onclick="addNode('remove_bg')"><span class="icon">✂️</span>抠图</button>
    <button class="tb-btn add-btn" data-type="mask_edit" onclick="addNode('mask_edit')"><span class="icon">🖌️</span>遮罩</button>
    <button class="tb-btn add-btn" data-type="seedance_video" onclick="addNode('seedance_video')"><span class="icon">🎬</span>视频生成</button>
    <div class="tb-divider"></div>
    <button class="tb-btn" onclick="saveCanvas()"><span class="icon">💾</span>保存</button>
    <button class="tb-btn" onclick="loadCanvasList()"><span class="icon">📂</span>加载</button>
    <div class="spacer"></div>
    <span id="zoom-display">100%</span>
    <button class="tb-btn" onclick="zoomBy(1.2)" title="放大">+</button>
    <button class="tb-btn" onclick="zoomBy(0.8)" title="缩小">−</button>
    <button class="tb-btn" onclick="resetView()" title="复位">⌂</button>
    <div class="tb-divider"></div>
    <button class="tb-btn danger" onclick="clearCanvas()">清空</button>
    <div class="tb-divider"></div>
    <button class="tb-btn" onclick="cloneChain()"><span class="icon">🔗</span>克隆链路</button>
    <button class="tb-btn primary" onclick="runCanvas()">▶ 运行</button>
  </div>

  <!-- ═══════════ 视口层 ═══════════ -->
  <div id="viewport">
    <div id="workspace">
      <div id="grid-bg"></div>
      <svg id="svg-layer"></svg>
      <div id="nodes-layer"></div>
    </div>
  </div>

  <!-- 右键菜单 -->
  <div id="context-menu">
    <div class="menu-item" onclick="addNodeAt('image_input', ctxPos.x, ctxPos.y)"><span class="mi-icon">🖼️</span>图片输入</div>
    <div class="menu-item" onclick="addNodeAt('gpt_image', ctxPos.x, ctxPos.y)"><span class="mi-icon">✨</span>AI 生图</div>
    <div class="menu-item" onclick="addNodeAt('remove_bg', ctxPos.x, ctxPos.y)"><span class="mi-icon">✂️</span>抠图</div>
    <div class="menu-item" onclick="addNodeAt('mask_edit', ctxPos.x, ctxPos.y)"><span class="mi-icon">🖌️</span>遮罩编辑</div>
    <div class="menu-item" onclick="addNodeAt('seedance_video', ctxPos.x, ctxPos.y)"><span class="mi-icon">🎬</span>视频生成</div>
  </div>

  <!-- 画布列表弹窗 -->
  <div id="canvas-modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-box" style="position:relative">
      <span class="close-btn" onclick="closeModal()">✕</span>
      <div class="modal-title">已保存的画布</div>
      <div id="canvas-list-body"></div>
    </div>
  </div>

  <!-- 遮罩编辑器弹窗 -->
  <div id="mask-editor-modal">
    <div class="mask-editor-box">
      <div class="mask-editor-header">
        <span>遮罩编辑器</span>
        <span class="close-btn" onclick="closeMaskEditor()">✕</span>
      </div>
      <div class="mask-editor-toolbar">
        <label>画笔大小: <input type="range" id="brush-size" min="10" max="80" value="30"></label>
        <button id="eraser-btn" onclick="toggleEraser()">橡皮擦</button>
        <button onclick="clearMask()">清空</button>
      </div>
      <canvas id="mask-canvas"></canvas>
      <div class="mask-editor-footer">
        <button onclick="closeMaskEditor()">取消</button>
        <button class="primary" onclick="saveMask()">保存遮罩</button>
      </div>
    </div>
  </div>

  <!-- 状态栏 -->
  <div id="statusbar">
    <div class="sb-item"><span class="sb-dot" id="sb-dot"></span><span id="sb-status">就绪</span></div>
    <div class="sb-item">节点: <span id="sb-nodes">0</span></div>
    <div class="sb-item">连线: <span id="sb-conns">0</span></div>
    <div style="flex:1"></div>
    <div class="sb-item" style="color:#444">右键添加节点 · 拖端口连线 · 滚轮缩放 · 中键/空格平移</div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // 数据模型
    // ═══════════════════════════════════════════════════════════════
    let canvasData = { nodes: [], connections: [] };
    let selectedNode = null, selectedConn = null;
    let currentCanvasId = null;
    const pollTimers = {};
    const nodeElements = {};

    let viewX = 100, viewY = 70, viewScale = 1;
    let isPanning = false, panStart = null;
    let isConnecting = false, connStart = null;

    const NODE_CFG = {
      image_input:   { icon: '🖼️', title: '图片输入', color: 'var(--c-image_input)' },
      gpt_image:     { icon: '✨', title: 'AI 生图',  color: 'var(--c-gpt_image)' },
      remove_bg:     { icon: '✂️', title: '抠图',     color: 'var(--c-remove_bg)' },
      mask_edit:     { icon: '🖌️', title: '遮罩编辑', color: 'var(--c-mask_edit)' },
      seedance_video:{ icon: '🎬', title: '视频生成', color: 'var(--c-seedance)' },
    };
    const STATUS_LABELS = { idle:'待机', pending:'排队', running:'运行中', success:'完成', failed:'失败', blocked:'阻断' };

    function uid() { return Math.random().toString(36).slice(2, 10); }

    // ═══════════════════════════════════════════════════════════════
    // 视口变换
    // ═══════════════════════════════════════════════════════════════
    function applyTransform() {
      document.getElementById('workspace').style.transform = `translate(${viewX}px,${viewY}px) scale(${viewScale})`;
      document.getElementById('zoom-display').textContent = Math.round(viewScale * 100) + '%';
    }
    function resetView() { viewX = 100; viewY = 70; viewScale = 1; applyTransform(); }
    function zoomBy(f) {
      const r = document.getElementById('viewport').getBoundingClientRect();
      const cx = r.width/2, cy = r.height/2;
      const wx = (cx-viewX)/viewScale, wy = (cy-viewY)/viewScale;
      viewScale = Math.max(0.2, Math.min(3, viewScale*f));
      viewX = cx - wx*viewScale; viewY = cy - wy*viewScale;
      applyTransform();
    }
    function screenToCanvas(sx, sy) { return { x: (sx-viewX)/viewScale, y: (sy-viewY)/viewScale }; }

    // ═══════════════════════════════════════════════════════════════
    // 节点管理
    // ═══════════════════════════════════════════════════════════════
    function addNode(type) {
      const r = document.getElementById('viewport').getBoundingClientRect();
      const c = screenToCanvas(r.width/2, r.height/2);
      addNodeAt(type, c.x, c.y);
    }
    function addNodeAt(type, x, y) {
      const node = { id: uid(), type, x: x-105, y: y-50, data: getDefaultData(type) };
      canvasData.nodes.push(node);
      renderNode(node);
      updateStatusbar();
      hideContextMenu();
      autoSave();
    }
    function getDefaultData(type) {
      switch (type) {
        case 'image_input': return { image_url: null };
        case 'gpt_image': return { prompt:'', hair:'', makeup:'', clothing:'', model:'gpt-image-2', ratio:'16:9' };
        case 'remove_bg': return {};
        case 'mask_edit': return { mask_url: null };
        case 'seedance_video': return { prompt:'', duration:'8', aspect_ratio:'9:16', channel:'official' };
        default: return {};
      }
    }
    function removeNode(id) {
      canvasData.connections = canvasData.connections.filter(c => c.from !== id && c.to !== id);
      canvasData.nodes = canvasData.nodes.filter(n => n.id !== id);
      if (nodeElements[id]) { nodeElements[id].remove(); delete nodeElements[id]; }
      if (selectedNode === id) selectedNode = null;
      stopPolling(id);
      renderConnections();
      updateStatusbar();
      autoSave();
    }
    function clearCanvas() {
      canvasData.nodes.forEach(n => stopPolling(n.id));
      canvasData = { nodes: [], connections: [] };
      Object.values(nodeElements).forEach(el => el.remove());
      Object.keys(nodeElements).forEach(k => delete nodeElements[k]);
      selectedNode = null; currentCanvasId = null;
      renderConnections(); updateStatusbar();
      localStorage.removeItem('autosave');
    }

    function cloneChain() {
      if (!selectedNode) { alert('请先选中一条链路中的任意节点'); return; }
      // BFS 找到整条链路的所有节点
      const chainNodes = new Set([selectedNode]);
      const queue = [selectedNode];
      while (queue.length) {
        const nid = queue.shift();
        // 上游
        for (const c of canvasData.connections) {
          if (c.to === nid && !chainNodes.has(c.from)) {
            chainNodes.add(c.from);
            queue.push(c.from);
          }
        }
        // 下游
        for (const c of canvasData.connections) {
          if (c.from === nid && !chainNodes.has(c.to)) {
            chainNodes.add(c.to);
            queue.push(c.to);
          }
        }
      }
      // 克隆节点
      const idMap = {};
      const offsetX = 40, offsetY = 40;
      for (const nid of chainNodes) {
        const old = canvasData.nodes.find(n => n.id === nid);
        if (!old) continue;
        const newId = uid();
        idMap[nid] = newId;
        const newNode = {
          id: newId,
          type: old.type,
          x: old.x + offsetX,
          y: old.y + offsetY,
          data: JSON.parse(JSON.stringify(old.data))
        };
        // 清除运行状态
        delete newNode.data._error;
        canvasData.nodes.push(newNode);
        renderNode(newNode);
      }
      // 克隆连线
      for (const c of canvasData.connections) {
        if (chainNodes.has(c.from) && chainNodes.has(c.to)) {
          canvasData.connections.push({
            id: uid(),
            from: idMap[c.from],
            to: idMap[c.to]
          });
        }
      }
      renderConnections();
      updateStatusbar();
      autoSave();
    }

    // ═══════════════════════════════════════════════════════════════
    // 节点渲染
    // ═══════════════════════════════════════════════════════════════
    function renderNode(node) {
      const cfg = NODE_CFG[node.type] || { icon:'📦', title:node.type, color:'#555' };
      const el = document.createElement('div');
      el.className = 'node' + (node.type === 'gpt_image' || node.type === 'seedance_video' ? ' gen-node' : '');
      el.style.left = node.x + 'px'; el.style.top = node.y + 'px';
      el.style.setProperty('--node-color', cfg.color);
      el.dataset.id = node.id;
      el.innerHTML = buildNodeHTML(node, cfg);
      document.getElementById('nodes-layer').appendChild(el);
      nodeElements[node.id] = el;
      bindNodeEvents(el, node);
      return el;
    }
    function buildNodeHTML(node, cfg) {
      const inPort = node.type === 'image_input' ? '' : '<div class="port port-in" data-port="in"></div>';
      const outPort = '<div class="port port-out" data-port="out"></div>';
      return `${inPort}${outPort}
        <button class="node-delete" onclick="removeNode('${node.id}')">✕</button>
        <div class="node-header" data-id="${node.id}">
          <span class="node-icon">${cfg.icon}</span>
          <span class="node-title">${cfg.title}</span>
          <span class="node-badge" id="badge-${node.id}">待机</span>
        </div>
        <div class="node-body">${buildNodeBody(node)}</div>`;
    }
    function buildNodeBody(node) {
      const d = node.data;
      let html = '';
      if (d.image_url) {
        html += `<div class="node-preview"><div class="checkerboard"></div><img src="${d.image_url}" /></div>`;
      } else {
        const cfg = NODE_CFG[node.type] || { icon:'📦' };
        html += `<div class="node-preview"><div class="checkerboard"></div><span class="preview-placeholder">${cfg.icon}</span></div>`;
      }
      if (node.type === 'image_input') {
        html += `<label class="upload-btn" for="upload-${node.id}"><span>📤 上传图片</span></label>
          <input id="upload-${node.id}" type="file" accept="image/*" style="display:none" onchange="uploadImage('${node.id}',this)" />`;
      } else if (node.type === 'gpt_image') {
        const thumb = d.image_url ? `<img src="${d.image_url}" />` : `<span class="gen-thumb-empty">?</span>`;
        const prompt = d.prompt || getDefaultImagePrompt();
        html += `
          <div class="gen-prompt-box">
            <div class="gen-thumb">${thumb}</div>
            <div class="gen-textarea-wrap">
              <textarea placeholder="输入提示词..." oninput="updateNodeData('${node.id}','prompt',this.value); updateCharCount(this)">${prompt}</textarea>
              <div class="gen-char-count">${prompt.length} / 2500</div>
            </div>
          </div>
          <div class="gen-toolbar">
            <select class="gen-model" onchange="updateNodeData('${node.id}','model',this.value)">
              <option value="gpt-image-2">GPT-image2.0（廉价版）</option>
              <option value="gpt-image-2-official">GPT-image2.0（官方稳定版）</option>
            </select>
            <select class="gen-ratio" onchange="updateNodeData('${node.id}','ratio',this.value)">
              <option value="16:9" ${d.ratio!=='9:16'?'selected':''}>16:9 · 自适应</option>
              <option value="9:16" ${d.ratio==='9:16'?'selected':''}>9:16 · 自适应</option>
              <option value="1:1" ${d.ratio==='1:1'?'selected':''}>1:1 · 自适应</option>
            </select>
            <div class="spacer"></div>
            <button class="magic-btn" onclick="polishPrompt('${node.id}')">✨ 润色</button>
            <div class="cost">💰 ≈0.03元</div>
          </div>
          <div style="display:flex;gap:5px;margin-top:4px">
            <div style="flex:1"><div class="node-label">发型（可选）</div><input class="node-input" placeholder="微分碎盖" value="${d.hair||''}" oninput="updateNodeData('${node.id}','hair',this.value)" /></div>
            <div style="flex:1"><div class="node-label">服装（可选）</div><input class="node-input" placeholder="机车夹克" value="${d.clothing||''}" oninput="updateNodeData('${node.id}','clothing',this.value)" /></div>
          </div>`;
      } else if (node.type === 'mask_edit') {
        if (d.mask_url) {
          html += `<div class="node-preview"><div class="checkerboard"></div><img src="${d.mask_url}" /></div>`;
        }
        html += `<div style="font-size:11px;color:var(--c-mask_edit);padding:4px 6px;background:rgba(236,72,153,0.06);border-radius:5px;text-align:center;">双击编辑遮罩</div>`;
      } else if (node.type === 'seedance_video') {
        const thumb = d.image_url ? `<img src="${d.image_url}" />` : `<span class="gen-thumb-empty">?</span>`;
        const prompt = d.prompt || getDefaultVideoPrompt();
        html += `
          <div class="gen-prompt-box">
            <div class="gen-thumb">${thumb}</div>
            <div class="gen-textarea-wrap">
              <textarea placeholder="输入视频描述..." oninput="updateNodeData('${node.id}','prompt',this.value); updateCharCount(this)">${prompt}</textarea>
              <div class="gen-char-count">${prompt.length} / 2500</div>
            </div>
          </div>
          <div class="gen-toolbar">
            <select class="gen-model" onchange="updateNodeData('${node.id}','channel',this.value)">
              <option value="official">seedance（官方稳定版）</option>
              <option value="low_cost">seedance（低价版）</option>
            </select>
            <select class="gen-ratio" onchange="updateNodeData('${node.id}','aspect_ratio',this.value)">
              <option value="9:16" ${d.aspect_ratio!=='16:9'?'selected':''}>9:16 · 自适应</option>
              <option value="16:9" ${d.aspect_ratio==='16:9'?'selected':''}>16:9 · 自适应</option>
            </select>
            <select class="gen-duration" onchange="updateNodeData('${node.id}','duration',this.value)">
              <option value="4" ${d.duration==='4'?'selected':''}>4秒</option>
              <option value="8" ${d.duration==='8'||!d.duration?'selected':''}>8秒</option>
              <option value="10" ${d.duration==='10'?'selected':''}>10秒</option>
              <option value="12" ${d.duration==='12'?'selected':''}>12秒</option>
              <option value="15" ${d.duration==='15'?'selected':''}>15秒</option>
            </select>
            <div class="spacer"></div>
            <div class="cost">💰 ≈0.08元</div>
          </div>`;
      }
      html += `<div class="node-progress-bar"><div class="fill" id="prog-${node.id}" style="width:0%"></div></div>`;
      if (d._error) html += `<div style="font-size:10px;color:#F87171;padding:3px 5px;background:rgba(239,68,68,0.06);border-radius:4px;">${d._error}</div>`;
      return html;
    }
    function updateNodeData(id, field, val) { const n = canvasData.nodes.find(n=>n.id===id); if(n) n.data[field]=val; autoSave(); }
    function updateCharCount(el) {
      const box = el.parentElement;
      const cnt = box.querySelector('.gen-char-count');
      if (cnt) cnt.textContent = el.value.length + ' / 2500';
      autoResizeTextarea(el);
    }
    function autoResizeTextarea(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 260) + 'px';
    }
    function getDefaultImagePrompt() {
      return '以图一人物作为唯一主体。\n保持图一人物的：\n五官、脸型、骨相、眼睛形状、鼻子、嘴唇厚度、肤色、年龄感、气质完全不变。\n仅参考图二的穿搭风格。';
    }
    function getDefaultVideoPrompt() {
      return '基于原图生成一段自然动态视频。人物保持五官不变，动作流畅，光影自然，背景协调。';
    }
    async function polishPrompt(nodeId) {
      const node = canvasData.nodes.find(n => n.id === nodeId);
      if (!node) return;
      const base = node.data.prompt || getDefaultImagePrompt();
      const p = base + '\n\n请优化：使用更具体的摄影与光影描述，增强画面质感与商业海报表现力。';
      node.data.prompt = p;
      refreshNodePreview(nodeId);
      autoSave();
    }
    function refreshNodePreview(id) {
      const node = canvasData.nodes.find(n=>n.id===id); if(!node) return;
      const el = nodeElements[id]; if(!el) return;
      el.querySelector('.node-body').innerHTML = buildNodeBody(node);
      const ta = el.querySelector('textarea');
      if (ta) { setTimeout(() => { updateCharCount(ta); }, 0); }
    }

    // ═══════════════════════════════════════════════════════════════
    // 图片上传
    // ═══════════════════════════════════════════════════════════════
    async function uploadImage(nodeId, input) {
      const file = input.files[0]; if(!file) return;
      const fd = new FormData(); fd.append('file', file);
      try {
        const r = await fetch('/api/assets/upload', { method:'POST', body:fd });
        const d = await r.json();
        const node = canvasData.nodes.find(n=>n.id===nodeId);
        if (node) { node.data.image_url = d.url; refreshNodePreview(nodeId); autoSave(); }
      } catch(e) { alert('上传失败: '+e.message); }
    }

    // ═══════════════════════════════════════════════════════════════
    // 遮罩编辑器
    // ═══════════════════════════════════════════════════════════════
    let maskEditorNodeId = null;
    let maskCtx = null;
    let maskDrawing = false;
    let maskEraser = false;
    let maskImage = null;
    let maskPaintCanvas = null; // 离屏画布：仅保存红色涂抹层

    function openMaskEditor(nodeId) {
      const node = canvasData.nodes.find(n => n.id === nodeId);
      if (!node) return;
      const upstreamConn = canvasData.connections.find(c => c.to === nodeId);
      let imageUrl = node.data.image_url;
      if (!imageUrl && upstreamConn) {
        const upstreamNode = canvasData.nodes.find(n => n.id === upstreamConn.from);
        if (upstreamNode) imageUrl = upstreamNode.data.image_url;
      }
      if (!imageUrl) { alert('请先连线上游图片输入节点'); return; }
      maskEditorNodeId = nodeId;
      maskEraser = false;
      const eraserBtn = document.getElementById('eraser-btn');
      if (eraserBtn) eraserBtn.style.background = '';
      document.getElementById('mask-editor-modal').style.display = 'flex';
      const canvas = document.getElementById('mask-canvas');
      maskCtx = canvas.getContext('2d');
      maskImage = new Image();
      maskImage.crossOrigin = 'anonymous';
      maskImage.onload = () => {
        canvas.width = maskImage.width;
        canvas.height = maskImage.height;
        maskPaintCanvas = document.createElement('canvas');
        maskPaintCanvas.width = maskImage.width;
        maskPaintCanvas.height = maskImage.height;
        const maxW = window.innerWidth * 0.8, maxH = window.innerHeight * 0.65;
        const scale = Math.min(maxW / maskImage.width, maxH / maskImage.height, 1);
        canvas.style.width = (maskImage.width * scale) + 'px';
        canvas.style.height = (maskImage.height * scale) + 'px';
        compositeMask();
        if (node.data.mask_url) {
          const existingMask = new Image();
          existingMask.crossOrigin = 'anonymous';
          existingMask.onload = () => {
            const tmpC = document.createElement('canvas');
            tmpC.width = maskImage.width; tmpC.height = maskImage.height;
            const tctx = tmpC.getContext('2d');
            tctx.drawImage(existingMask, 0, 0);
            const mData = tctx.getImageData(0, 0, tmpC.width, tmpC.height).data;
            const pctx = maskPaintCanvas.getContext('2d');
            const oData = pctx.createImageData(tmpC.width, tmpC.height);
            const od = oData.data;
            for (let i = 0; i < mData.length; i += 4) {
              if (mData[i+3] < 128) {
                od[i] = 236; od[i+1] = 72; od[i+2] = 153; od[i+3] = 128;
              }
            }
            pctx.putImageData(oData, 0, 0);
            compositeMask();
          };
          existingMask.src = node.data.mask_url;
        }
      };
      maskImage.src = imageUrl;
    }

    function compositeMask() {
      if (!maskCtx || !maskImage) return;
      maskCtx.clearRect(0, 0, maskCtx.canvas.width, maskCtx.canvas.height);
      maskCtx.drawImage(maskImage, 0, 0);
      if (maskPaintCanvas) maskCtx.drawImage(maskPaintCanvas, 0, 0);
    }

    function redrawMask() { compositeMask(); }

    function closeMaskEditor() {
      document.getElementById('mask-editor-modal').style.display = 'none';
      maskEditorNodeId = null;
      maskDrawing = false;
    }

    function toggleEraser() {
      maskEraser = !maskEraser;
      const btn = document.getElementById('eraser-btn');
      if (btn) btn.style.background = maskEraser ? 'rgba(236,72,153,0.2)' : '';
    }

    function clearMask() {
      if (!maskPaintCanvas) return;
      const pctx = maskPaintCanvas.getContext('2d');
      pctx.clearRect(0, 0, maskPaintCanvas.width, maskPaintCanvas.height);
      compositeMask();
    }

    function getMaskPos(e) {
      const canvas = document.getElementById('mask-canvas');
      const r = canvas.getBoundingClientRect();
      const sx = canvas.width / r.width, sy = canvas.height / r.height;
      return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
    }

    function startMaskDraw(e) {
      maskDrawing = true;
      drawMask(e);
    }

    function drawMask(e) {
      if (!maskDrawing || !maskCtx || !maskPaintCanvas) return;
      const pos = getMaskPos(e);
      const size = parseInt(document.getElementById('brush-size').value);
      const pctx = maskPaintCanvas.getContext('2d');
      if (maskEraser) {
        pctx.save();
        pctx.globalCompositeOperation = 'destination-out';
        pctx.beginPath();
        pctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
        pctx.fillStyle = 'rgba(0,0,0,1)';
        pctx.fill();
        pctx.restore();
      } else {
        pctx.fillStyle = 'rgba(236,72,153,0.5)';
        pctx.beginPath();
        pctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
        pctx.fill();
      }
      compositeMask();
    }

    function stopMaskDraw() {
      maskDrawing = false;
    }

    async function saveMask() {
      if (!maskPaintCanvas || !maskEditorNodeId) return;
      const pctx = maskPaintCanvas.getContext('2d');
      const pData = pctx.getImageData(0, 0, maskPaintCanvas.width, maskPaintCanvas.height).data;
      const tmp = document.createElement('canvas');
      tmp.width = maskPaintCanvas.width;
      tmp.height = maskPaintCanvas.height;
      const tctx = tmp.getContext('2d');
      const maskData = tctx.createImageData(tmp.width, tmp.height);
      const md = maskData.data;
      for (let i = 0; i < pData.length; i += 4) {
        if (pData[i+3] > 10) {
          md[i] = 0; md[i+1] = 0; md[i+2] = 0; md[i+3] = 0;
        } else {
          md[i] = 0; md[i+1] = 0; md[i+2] = 0; md[i+3] = 255;
        }
      }
      tctx.putImageData(maskData, 0, 0);
      tmp.toBlob(async (blob) => {
        const fd = new FormData();
        fd.append('file', blob, 'mask.png');
        try {
          const resp = await fetch('/api/assets/upload', { method: 'POST', body: fd });
          const d = await resp.json();
          const node = canvasData.nodes.find(n => n.id === maskEditorNodeId);
          if (node) {
            node.data.mask_url = d.url;
            refreshNodePreview(maskEditorNodeId);
            autoSave();
          }
          closeMaskEditor();
        } catch(e) { alert('遮罩上传失败: ' + e.message); }
      }, 'image/png');
    }

    // 绑定 canvas 涂抹事件（一次性）
    (function() {
      const c = document.getElementById('mask-canvas');
      c.addEventListener('mousedown', startMaskDraw);
      c.addEventListener('mousemove', drawMask);
      c.addEventListener('mouseup', stopMaskDraw);
      c.addEventListener('mouseleave', stopMaskDraw);
    })();

    // ═══════════════════════════════════════════════════════════════
    // 连线渲染（SVG 贝塞尔曲线）
    // ═══════════════════════════════════════════════════════════════
    function renderConnections() {
      const svg = document.getElementById('svg-layer');
      const temp = svg.querySelector('.conn-temp');
      svg.innerHTML = '';
      if (temp) svg.appendChild(temp);
      for (const conn of canvasData.connections) {
        const fn = canvasData.nodes.find(n=>n.id===conn.from);
        const tn = canvasData.nodes.find(n=>n.id===conn.to);
        if (!fn || !tn) continue;
        const fe = nodeElements[conn.from], te = nodeElements[conn.to];
        if (!fe || !te) continue;
        const x1 = fn.x + fe.offsetWidth, y1 = fn.y + fe.offsetHeight/2;
        const x2 = tn.x, y2 = tn.y + te.offsetHeight/2;
        const dx = Math.max(40, Math.abs(x2-x1)*0.35);
        const p = `M ${x1} ${y1} C ${x1+dx} ${y1}, ${x2-dx} ${y2}, ${x2} ${y2}`;
        const el = document.createElementNS('http://www.w3.org/2000/svg','path');
        el.setAttribute('d', p);
        let cls = 'conn-path';
        if (selectedConn === conn.id) cls += ' selected';
        // 运行中的连线动画
        if (currentCanvasId) {
          const rec = pollTimers[conn.from];
          if (rec) cls += ' running';
        }
        el.setAttribute('class', cls);
        el.dataset.connId = conn.id;
        el.addEventListener('click', (e) => { e.stopPropagation(); selectedConn = conn.id; renderConnections(); });
        svg.appendChild(el);
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // 节点交互
    // ═══════════════════════════════════════════════════════════════
    function bindNodeEvents(el, node) {
      const header = el.querySelector('.node-header');
      header.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        e.stopPropagation();
        selectedNode = node.id;
        document.querySelectorAll('.node.selected').forEach(n => n.classList.remove('selected'));
        el.classList.add('selected', 'dragging');
        const sx = e.clientX, sy = e.clientY, ox = node.x, oy = node.y;
        function mv(ev) {
          node.x = ox + (ev.clientX-sx)/viewScale;
          node.y = oy + (ev.clientY-sy)/viewScale;
          el.style.left = node.x+'px'; el.style.top = node.y+'px';
          const aff = canvasData.connections.filter(c=>c.from===node.id||c.to===node.id);
          if (aff.length) renderConnections();
        }
        function up() {
          el.classList.remove('dragging');
          document.removeEventListener('mousemove', mv);
          document.removeEventListener('mouseup', up);
          autoSave();
        }
        document.addEventListener('mousemove', mv);
        document.addEventListener('mouseup', up);
      });
      const outPort = el.querySelector('.port-out');
      if (outPort) {
        outPort.addEventListener('mousedown', (e) => {
          e.stopPropagation(); e.preventDefault();
          isConnecting = true; connStart = node.id;
        });
      }
      el.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('port') || e.target.closest('.node-header')) return;
        selectedNode = node.id;
        document.querySelectorAll('.node.selected').forEach(n => n.classList.remove('selected'));
        el.classList.add('selected');
      });
      if (node.type === 'mask_edit') {
        el.addEventListener('dblclick', (e) => {
          e.stopPropagation();
          openMaskEditor(node.id);
        });
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // 画布交互
    // ═══════════════════════════════════════════════════════════════
    const viewport = document.getElementById('viewport');
    viewport.addEventListener('wheel', (e) => {
      e.preventDefault();
      const r = viewport.getBoundingClientRect();
      const mx = e.clientX-r.left, my = e.clientY-r.top;
      const wx = (mx-viewX)/viewScale, wy = (my-viewY)/viewScale;
      const f = e.deltaY < 0 ? 1.1 : 0.9;
      viewScale = Math.max(0.2, Math.min(3, viewScale*f));
      viewX = mx-wx*viewScale; viewY = my-wy*viewScale;
      applyTransform();
    }, { passive: false });

    let spaceDown = false;
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && !spaceDown && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
        spaceDown = true; viewport.style.cursor = 'grab';
      }
      if (e.key === 'Delete' || e.key === 'Backspace') {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (selectedConn) {
          canvasData.connections = canvasData.connections.filter(c=>c.id!==selectedConn);
          selectedConn = null; renderConnections(); updateStatusbar(); autoSave();
        } else if (selectedNode) { removeNode(selectedNode); }
      }
    });
    document.addEventListener('keyup', (e) => {
      if (e.code === 'Space') { spaceDown = false; viewport.style.cursor = 'default'; }
    });

    viewport.addEventListener('mousedown', (e) => {
      const mid = e.button === 1, sp = e.button === 0 && spaceDown;
      if (!mid && !sp) {
        if (isConnecting) {
          const t = document.elementFromPoint(e.clientX, e.clientY);
          if (t && t.classList.contains('port-in')) {
            const tn = t.closest('.node');
            if (tn && tn.dataset.id !== connStart) {
              const id = tn.dataset.id;
              if (!canvasData.connections.some(c=>c.from===connStart&&c.to===id)) {
                canvasData.connections.push({ id: uid(), from: connStart, to: id });
                renderConnections(); updateStatusbar(); autoSave();
              }
            }
          }
          isConnecting = false; connStart = null;
          const temp = document.getElementById('svg-layer').querySelector('.conn-temp');
          if (temp) temp.remove();
        }
        return;
      }
      e.preventDefault();
      isPanning = true; viewport.classList.add('panning');
      panStart = { x: e.clientX, y: e.clientY, vx: viewX, vy: viewY };
    });

    document.addEventListener('mousemove', (e) => {
      if (isPanning) {
        viewX = panStart.vx + (e.clientX-panStart.x);
        viewY = panStart.vy + (e.clientY-panStart.y);
        applyTransform(); return;
      }
      if (isConnecting && connStart) {
        const fn = canvasData.nodes.find(n=>n.id===connStart);
        const fe = nodeElements[connStart];
        if (!fn || !fe) return;
        const x1 = fn.x+fe.offsetWidth, y1 = fn.y+fe.offsetHeight/2;
        const r = viewport.getBoundingClientRect();
        const c = screenToCanvas(e.clientX-r.left, e.clientY-r.top);
        const dx = Math.max(40, Math.abs(c.x-x1)*0.35);
        const p = `M ${x1} ${y1} C ${x1+dx} ${y1}, ${c.x-dx} ${c.y}, ${c.x} ${c.y}`;
        let t = document.getElementById('svg-layer').querySelector('.conn-temp');
        if (!t) { t = document.createElementNS('http://www.w3.org/2000/svg','path'); t.setAttribute('class','conn-temp'); document.getElementById('svg-layer').appendChild(t); }
        t.setAttribute('d', p);
      }
    });
    document.addEventListener('mouseup', () => {
      if (isPanning) { isPanning = false; viewport.classList.remove('panning'); }
    });

    let ctxPos = { x:0, y:0 };
    viewport.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const r = viewport.getBoundingClientRect();
      ctxPos = screenToCanvas(e.clientX-r.left, e.clientY-r.top);
      const m = document.getElementById('context-menu');
      m.style.display = 'block'; m.style.left = e.clientX+'px'; m.style.top = e.clientY+'px';
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#context-menu')) hideContextMenu();
      if (!e.target.closest('.node') && !e.target.closest('.conn-path')) {
        selectedNode = null; selectedConn = null;
        document.querySelectorAll('.node.selected').forEach(n=>n.classList.remove('selected'));
        renderConnections();
      }
    });
    function hideContextMenu() { document.getElementById('context-menu').style.display = 'none'; }

    // ═══════════════════════════════════════════════════════════════
    // 运行画布
    // ═══════════════════════════════════════════════════════════════
    async function runCanvas() {
      if (canvasData.nodes.length === 0) { alert('画布为空，请先添加节点'); return; }
      Object.keys(pollTimers).forEach(stopPolling);
      const r = await fetch('/api/canvas/run', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nodes: canvasData.nodes.map(n => ({ id:n.id, type:n.type, x:n.x, y:n.y, data:n.data })),
          connections: canvasData.connections.map(c => ({ id:c.id, from:c.from, to:c.to }))
        })
      });
      const d = await r.json();
      currentCanvasId = d.canvas_id;
      for (const n of canvasData.nodes) startPolling(n.id);
      updateStatusbar('running');
    }

    function startPolling(nodeId) {
      if (pollTimers[nodeId]) clearInterval(pollTimers[nodeId]);
      pollTimers[nodeId] = setInterval(async () => {
        if (!currentCanvasId) return;
        try {
          const r = await fetch(`/api/canvas/${currentCanvasId}/nodes/${nodeId}`);
          if (!r.ok) return;
          const d = await r.json();
          updateNodeUI(nodeId, d);
          if (['success','failed','blocked'].includes(d.status)) { stopPolling(nodeId); checkAllDone(); }
        } catch(e) {}
      }, 800);
    }
    function stopPolling(nodeId) { if (pollTimers[nodeId]) { clearInterval(pollTimers[nodeId]); delete pollTimers[nodeId]; renderConnections(); } }
    function updateNodeUI(nodeId, d) {
      const badge = document.getElementById('badge-'+nodeId);
      if (badge) { badge.textContent = STATUS_LABELS[d.status]||d.status; badge.className = 'node-badge '+d.status; }
      const prog = document.getElementById('prog-'+nodeId);
      if (prog) { prog.style.width = d.progress+'%'; prog.className = 'fill '+d.status; }
      if (d.image_url) {
        const node = canvasData.nodes.find(n=>n.id===nodeId);
        if (node && node.data.image_url !== d.image_url) { node.data.image_url = d.image_url; refreshNodePreview(nodeId); }
      }
      if (d.error) { const node = canvasData.nodes.find(n=>n.id===nodeId); if(node) { node.data._error = d.error; refreshNodePreview(nodeId); } }
    }
    function checkAllDone() {
      if (Object.keys(pollTimers).length === 0) updateStatusbar('done');
    }

    // ═══════════════════════════════════════════════════════════════
    // 画布持久化
    // ═══════════════════════════════════════════════════════════════
    let autoSaveTimer = null;
    function autoSave() {
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(() => {
        localStorage.setItem('autosave', JSON.stringify(canvasData));
      }, 2000);
    }

    async function saveCanvas() {
      const name = prompt('画布名称：', '我的画布');
      if (!name) return;
      const r = await fetch('/api/canvas/save', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name,
          nodes: canvasData.nodes.map(n => ({ id:n.id, type:n.type, x:n.x, y:n.y, data:n.data })),
          connections: canvasData.connections.map(c => ({ id:c.id, from:c.from, to:c.to }))
        })
      });
      const d = await r.json();
      alert(`已保存：${d.name}（${d.id}）`);
    }

    async function loadCanvasList() {
      const r = await fetch('/api/canvas/list');
      const d = await r.json();
      const body = document.getElementById('canvas-list-body');
      if (d.canvases.length === 0) { body.innerHTML = '<div style="color:#555;font-size:12px;text-align:center;padding:20px">暂无已保存画布</div>'; }
      else {
        body.innerHTML = d.canvases.map(c => {
          const dt = new Date(c.saved_at * 1000).toLocaleString('zh-CN');
          return `<div class="canvas-item" onclick="loadCanvas('${c.id}')">
            <span style="font-size:14px">📋</span>
            <div class="ci-name">${c.name}</div>
            <div class="ci-meta">${c.node_count} 节点 · ${dt}</div>
          </div>`;
        }).join('');
      }
      document.getElementById('canvas-modal').style.display = 'flex';
    }

    async function loadCanvas(id) {
      const r = await fetch(`/api/canvas/${id}`);
      const d = await r.json();
      // 清空当前画布
      canvasData.nodes.forEach(n => stopPolling(n.id));
      Object.values(nodeElements).forEach(el => el.remove());
      Object.keys(nodeElements).forEach(k => delete nodeElements[k]);
      // 加载新画布
      canvasData = { nodes: d.nodes || [], connections: d.connections || [] };
      canvasData.nodes.forEach(renderNode);
      renderConnections();
      updateStatusbar();
      closeModal();
      autoSave();
    }

    function closeModal() { document.getElementById('canvas-modal').style.display = 'none'; }

    // ═══════════════════════════════════════════════════════════════
    // 状态栏
    // ═══════════════════════════════════════════════════════════════
    function updateStatusbar(state) {
      document.getElementById('sb-nodes').textContent = canvasData.nodes.length;
      document.getElementById('sb-conns').textContent = canvasData.connections.length;
      const dot = document.getElementById('sb-dot'), st = document.getElementById('sb-status');
      dot.className = 'sb-dot';
      if (state === 'running') { dot.classList.add('running'); st.textContent = '运行中...'; }
      else if (state === 'done') { st.textContent = '全部完成'; }
      else { st.textContent = '就绪'; }
    }

    // ═══════════════════════════════════════════════════════════════
    // 初始化
    // ═══════════════════════════════════════════════════════════════
    applyTransform();
    updateStatusbar();

    // 从 localStorage 恢复自动保存的画布
    const saved = localStorage.getItem('autosave');
    if (saved) {
      try {
        const d = JSON.parse(saved);
        if (d.nodes && d.nodes.length > 0) {
          canvasData = d;
          canvasData.nodes.forEach(renderNode);
          renderConnections();
          updateStatusbar();
        }
      } catch(e) {}
    }

    // 如果没有自动保存，放示例节点引导用户
    if (canvasData.nodes.length === 0) {
      addNodeAt('image_input', 260, 250);
      addNodeAt('gpt_image', 760, 250);
      renderConnections();
      updateStatusbar();
    }

    window.addEventListener('resize', () => renderConnections());
    window.addEventListener('beforeunload', () => {
      localStorage.setItem('autosave', JSON.stringify(canvasData));
    });
  </script>
</body>
</html>
