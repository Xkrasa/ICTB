<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 团播资产画布 — Phase 1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
  <style>
    /* 棋盘格背景，用于显示背透 PNG 的透明区域 */
    .checkerboard {
      background-image:
        linear-gradient(45deg, #ddd 25%, transparent 25%),
        linear-gradient(-45deg, #ddd 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ddd 75%),
        linear-gradient(-45deg, transparent 75%, #ddd 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    }
  </style>
</head>
<body class="bg-gray-100">
  <div class="flex h-screen">
    <!-- 左栏：并发流水线卡片轨 -->
    <div class="w-1/2 p-4 overflow-y-auto">
      <div class="flex items-center justify-between mb-4">
        <h1 class="text-xl font-bold">流水线卡片轨</h1>
        <button onclick="addWorkflow()" class="bg-blue-600 text-white px-3 py-1.5 rounded hover:bg-blue-700">+ 新增流水线</button>
      </div>
      <div id="track" class="space-y-3"></div>
    </div>

    <!-- 右栏：Fabric.js 画布占位 + 上传测试 -->
    <div class="w-1/2 p-4 border-l bg-white flex flex-col">
      <h2 class="text-lg font-bold mb-2">Fabric.js 画布</h2>
      <div class="border-2 border-dashed border-gray-300 rounded flex items-center justify-center h-80 text-gray-400">
        Fabric.js 画布（Phase 2 接入）
      </div>

      <h3 class="text-sm font-semibold mt-4 mb-2 text-gray-600">资产上传测试（验收点 5）</h3>
      <input id="uploadInput" type="file" accept="image/*" onchange="uploadAsset(this)" class="text-sm" />
      <div id="uploadResult" class="text-xs mt-2"></div>
    </div>
  </div>

  <script>
    // workflows 数组数据驱动；每张卡片拥有独立轮询定时器，互不影响
    let workflows = [];
    const timers = {};  // wfId -> setInterval id

    function uid() {
      return Math.random().toString(36).slice(2, 10);
    }

    function addWorkflow() {
      workflows.push({
        id: uid(),
        // 阶段一·形象加工输入
        reference_image_url: null,
        hair: '', makeup: '', clothing: '',
        // 任务状态（mock/character 共用，同一卡片同一时间只跑一个阶段）
        stage: null,
        tid: null,
        status: 'idle',
        progress: 0,
        assets: null,
        error: null
      });
      render();
    }

    function removeWorkflow(id) {
      if (timers[id]) { clearInterval(timers[id]); delete timers[id]; }
      workflows = workflows.filter(w => w.id !== id);
      render();
    }

    function updateField(id, field, value) {
      const wf = workflows.find(w => w.id === id);
      if (wf) wf[field] = value;
    }

    // 每张卡片独立上传主播原图（阶段一参考图）
    async function uploadReference(id, input) {
      const wf = workflows.find(w => w.id === id);
      if (!wf) return;
      const file = input.files[0];
      if (!file) return;
      const fd = new FormData();
      fd.append('file', file);
      wf.reference_image_url = null;
      render();
      try {
        const resp = await fetch('/api/assets/upload', { method: 'POST', body: fd });
        const data = await resp.json();
        wf.reference_image_url = data.url;
        render();
      } catch (e) {
        alert('上传失败: ' + e.message);
      }
    }

    async function runCharacter(id) {
      const wf = workflows.find(w => w.id === id);
      if (!wf) return;
      if (!wf.reference_image_url) { alert('请先上传主播原图'); return; }
      if (!wf.hair || !wf.makeup || !wf.clothing) { alert('请填写发型/妆容/服装'); return; }
      wf.stage = 'character';
      wf.status = 'pending';
      wf.progress = 0;
      wf.assets = null;
      wf.error = null;
      wf.tid = null;
      render();
      try {
        const resp = await fetch('/api/stages/character/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            workflow_id: id,
            reference_image_url: wf.reference_image_url,
            hair: wf.hair,
            makeup: wf.makeup,
            clothing: wf.clothing
          })
        });
        const data = await resp.json();
        wf.tid = data.task_id;
        pollTask(id, data.task_id);
      } catch (e) {
        wf.status = 'failed';
        wf.error = e.message;
        render();
      }
    }

    async function runMock(id) {
      const wf = workflows.find(w => w.id === id);
      if (!wf) return;
      wf.stage = 'mock';
      wf.status = 'pending';
      wf.progress = 0;
      wf.assets = null;
      wf.error = null;
      wf.tid = null;
      render();
      try {
        const resp = await fetch('/api/stages/mock/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ workflow_id: id })
        });
        const data = await resp.json();
        wf.tid = data.task_id;
        pollTask(id, data.task_id);
      } catch (e) {
        wf.status = 'failed';
        wf.error = e.message;
        render();
      }
    }

    // 每张卡片独立定时器，是核心验收点
    function pollTask(id, taskId) {
      timers[id] = setInterval(async () => {
        try {
          const resp = await fetch(`/api/tasks/${taskId}`);
          if (!resp.ok) return;
          const data = await resp.json();
          const wf = workflows.find(w => w.id === id);
          if (!wf) return;
          wf.status = data.status;
          wf.progress = data.progress;
          wf.assets = data.assets;
          wf.error = data.error;
          render();
          if (data.status === 'success' || data.status === 'failed') {
            clearInterval(timers[id]);
            delete timers[id];
          }
        } catch (e) { /* 网络抖动，下个 tick 重试 */ }
      }, 1500);
    }

    async function uploadAsset(input) {
      const file = input.files[0];
      if (!file) return;
      const fd = new FormData();
      fd.append('file', file);
      const out = document.getElementById('uploadResult');
      out.textContent = '上传中...';
      try {
        const resp = await fetch('/api/assets/upload', { method: 'POST', body: fd });
        const data = await resp.json();
        out.innerHTML = `上传成功，URL: <a href="${data.url}" target="_blank" class="text-blue-600 underline break-all">${data.url}</a>`;
      } catch (e) {
        out.textContent = '上传失败: ' + e.message;
      }
    }

    function badgeClasses(s) {
      const map = {
        idle: 'bg-gray-100 text-gray-700',
        pending: 'bg-yellow-100 text-yellow-700',
        running: 'bg-blue-100 text-blue-700',
        success: 'bg-green-100 text-green-700',
        failed: 'bg-red-100 text-red-700'
      };
      return map[s] || map.idle;
    }

    function isBusy(s) {
      return s === 'running' || s === 'pending';
    }

    // 进度条颜色按阶段区分：character 主题绿，mock 蓝
    function barClasses(stage) {
      return stage === 'character' ? 'bg-emerald-500' : 'bg-blue-500';
    }

    function render() {
      const track = document.getElementById('track');
      if (workflows.length === 0) {
        track.innerHTML = '<div class="text-gray-400 text-center py-8">点击「+ 新增流水线」开始</div>';
        return;
      }
      track.innerHTML = workflows.map(wf => `
        <div class="bg-white rounded shadow p-3">
          <div class="flex items-center justify-between mb-2">
            <span class="font-semibold">卡片 ${wf.id}</span>
            <button onclick="removeWorkflow('${wf.id}')" class="px-2 py-1 rounded bg-red-500 text-white hover:bg-red-600">删除</button>
          </div>

          <!-- 阶段一·形象加工输入 -->
          <div class="border rounded p-2 mb-2 bg-gray-50">
            <div class="text-xs font-semibold text-gray-600 mb-1">阶段一 · 形象加工</div>
            <div class="mb-1 flex items-center">
              <input type="file" accept="image/*" onchange="uploadReference('${wf.id}', this)" class="text-xs" ${isBusy(wf.status) ? 'disabled' : ''} />
              <span class="text-xs ml-2 ${wf.reference_image_url ? 'text-green-600' : 'text-gray-400'}">${wf.reference_image_url ? '已上传' : '未上传'}</span>
            </div>
            <div class="grid grid-cols-3 gap-1 mb-1">
              <input type="text" placeholder="发型" value="${wf.hair}" oninput="updateField('${wf.id}','hair',this.value)" class="text-xs border rounded px-1 py-0.5" ${isBusy(wf.status) ? 'disabled' : ''} />
              <input type="text" placeholder="妆容" value="${wf.makeup}" oninput="updateField('${wf.id}','makeup',this.value)" class="text-xs border rounded px-1 py-0.5" ${isBusy(wf.status) ? 'disabled' : ''} />
              <input type="text" placeholder="服装" value="${wf.clothing}" oninput="updateField('${wf.id}','clothing',this.value)" class="text-xs border rounded px-1 py-0.5" ${isBusy(wf.status) ? 'disabled' : ''} />
            </div>
            <button onclick="runCharacter('${wf.id}')" ${isBusy(wf.status) ? 'disabled' : ''}
              class="px-2 py-1 rounded text-white text-xs ${isBusy(wf.status) ? 'bg-gray-400' : 'bg-emerald-600 hover:bg-emerald-700'}">运行形象加工</button>
          </div>

          <!-- mock 回归测试 -->
          <div class="mb-2">
            <button onclick="runMock('${wf.id}')" ${isBusy(wf.status) ? 'disabled' : ''}
              class="px-2 py-1 rounded text-white text-xs ${isBusy(wf.status) ? 'bg-gray-400' : 'bg-gray-500 hover:bg-gray-600'}">运行 mock（回归）</button>
          </div>

          <!-- 状态 + 进度 -->
          <div class="text-sm mb-1">状态：
            <span class="px-2 rounded ${badgeClasses(wf.status)}">${wf.status}</span>
            ${wf.stage ? `<span class="text-xs text-gray-500 ml-1">${wf.stage}</span>` : ''}
          </div>
          <div class="w-full bg-gray-200 rounded h-3 overflow-hidden">
            <div class="${barClasses(wf.stage)} h-3 transition-all" style="width:${wf.progress}%"></div>
          </div>
          <div class="text-xs text-gray-500 mt-1">进度 ${wf.progress}%</div>

          ${wf.error ? `<div class="text-xs text-red-600 mt-1 break-all">错误：${wf.error}</div>` : ''}

          ${wf.assets && wf.assets.character_png
            ? `<div class="mt-2"><div class="text-xs text-gray-600 mb-1">产出背透 PNG（点击放大）：</div><a href="${wf.assets.character_png}" target="_blank"><img src="${wf.assets.character_png}" class="max-h-40 border rounded checkerboard" /></a></div>`
            : ''}
        </div>
      `).join('');
    }

    render();
  </script>
</body>
</html>
